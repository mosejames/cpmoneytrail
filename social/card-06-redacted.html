<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>CP Money Trail — Redacted Descriptions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      background: #0a0a0a; font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased; position: relative;
    }
    body::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px);
      pointer-events: none; z-index: 0;
    }
    .brand {
      position: absolute; top: 40px; left: 48px;
      font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase; color: #e63946; z-index: 2;
    }
    .url {
      position: absolute; bottom: 40px; right: 48px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #888; z-index: 2;
    }
    .content {
      position: relative; z-index: 1; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .invoice-lines {
      display: flex; flex-direction: column; gap: 20px;
      margin-bottom: 36px;
    }
    .line {
      font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 400;
      color: #e0e0e0; white-space: nowrap;
    }
    .line .redact-bar {
      display: inline-block;
      background: #e63946;
      opacity: 0.7;
      height: 18px;
      width: 260px;
      vertical-align: middle;
      border-radius: 2px;
    }
    .line.stripped {
      color: #888;
    }
    .line.stripped .label {
      color: #e0e0e0;
    }
    .context {
      font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 400;
      color: #e0e0e0; max-width: 700px; text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="brand">CP MONEY TRAIL</div>
  <div class="url">cpmoneytrail.com</div>
  <div class="content">
    <div class="invoice-lines">
      <div class="line">WAD&nbsp;&nbsp;2.50 hrs&nbsp;&nbsp;$487.50&nbsp;&nbsp;Drafted motion to dismiss</div>
      <div class="line">WAD&nbsp;&nbsp;3.10 hrs&nbsp;&nbsp;$604.50&nbsp;&nbsp;<span class="redact-bar"></span></div>
      <div class="line stripped">Rogers Automotive&nbsp;&nbsp;54.7 hrs&nbsp;&nbsp;$10,292.30</div>
    </div>
    <div class="context">They stopped describing what they were billing for. Why?</div>
  </div>
</body>
</html>
